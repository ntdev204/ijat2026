services:
  postgres:
    image: postgres:16
    container_name: rai-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rai_website}
      POSTGRES_USER: ${POSTGRES_USER:-robot_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raik63}
    volumes:
      - rai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 100.116.199.115 -p 5432 -U ${POSTGRES_USER:-robot_admin} -d ${POSTGRES_DB:-rai_website}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  rai_postgres_data:
