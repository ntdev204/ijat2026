<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
      .panel-soft { fill: #fdfefe; stroke: #4b5563; stroke-width: 1.5; rx: 10; ry: 10; }
      .controller { fill: #e7f0ff; stroke: #1d4ed8; stroke-width: 2; rx: 10; ry: 10; }
      .plant { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 10; ry: 10; }
      .sensor { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; ry: 10; }
      .setpoint { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10; ry: 10; }
      .math { fill: #f9fafb; stroke: #6b7280; stroke-width: 1.5; rx: 10; ry: 10; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 600 18px Arial, Helvetica, sans-serif; fill: #374151; }
      .h { font: 700 20px Arial, Helvetica, sans-serif; fill: #111827; }
      .t { font: 16px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .s { font: 14px Arial, Helvetica, sans-serif; fill: #374151; }
      .mono { font: 15px 'Courier New', monospace; fill: #111827; }
      .tiny { font: 12px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .arrow { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#m); }
      .arrow-soft { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#m2); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#111827"/>
    </marker>
    <marker id="m2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1200"/>

  <text class="title" x="900" y="45" text-anchor="middle">Closed-Loop Control Architecture Derived from the Codebase</text>
  <text class="subtitle" x="900" y="78" text-anchor="middle">RAI robot: high-level ROS2 CCA-NMPC + low-level STM32 wheel-speed feedback loop</text>

  <rect class="setpoint" x="60" y="120" width="260" height="150"/>
  <text class="h" x="85" y="155">Setpoint layer</text>
  <text class="t" x="85" y="185">1) Global goal:</text>
  <text class="mono" x="85" y="210">/goal_pose -&gt; X_ref</text>
  <text class="t" x="85" y="240">2) Local speed setpoint:</text>
  <text class="mono" x="85" y="265">u = [v_x, v_y, omega]^T</text>

  <rect class="sensor" x="60" y="360" width="260" height="240"/>
  <text class="h" x="85" y="395">Perception / feedback</text>
  <text class="mono" x="85" y="430">/odom_combined</text>
  <text class="mono" x="85" y="455">/imu/data</text>
  <text class="mono" x="85" y="480">/scan_filtered</text>
  <text class="mono" x="85" y="505">/map</text>
  <text class="mono" x="85" y="530">/canmpc/humans</text>
  <text class="s" x="85" y="560">Human state after YOLO + depth +</text>
  <text class="s" x="85" y="582">Kalman tracking:</text>
  <text class="mono" x="85" y="607">S_h = [x_h, y_h, v_hx, v_hy]^T</text>

  <rect class="controller" x="380" y="120" width="540" height="480"/>
  <text class="h" x="405" y="155">High-level closed loop: ROS2 CCA-NMPC</text>
  <text class="t" x="405" y="190">Controller id: CCA_NMPC</text>
  <text class="t" x="405" y="215">control_frequency = 25 Hz, sample_time = 0.04 s, horizon_steps = 20</text>
  <text class="t" x="405" y="245">State estimate:</text>
  <text class="mono" x="405" y="270">X_r = [x_r, y_r, theta_r]^T</text>
  <text class="t" x="405" y="300">Control output:</text>
  <text class="mono" x="405" y="325">u_k = [v_x, v_y, omega]^T</text>
  <text class="t" x="405" y="355">Dynamics used by optimizer (docs/1_mo_hinh_toan_ccanmpc.md):</text>
  <text class="mono" x="405" y="380">f(theta) = [v_x cos(theta) - v_y sin(theta),</text>
  <text class="mono" x="405" y="403">            v_x sin(theta) + v_y cos(theta), omega]^T</text>
  <text class="mono" x="405" y="431">X_(k+1) = RK4(X_k, u_k, T_s)</text>
  <text class="t" x="405" y="466">Context-aware objective:</text>
  <text class="mono" x="405" y="491">min J = sum ||X_r - X_ref||^2_Q(phi_h) + ||u||^2_R + ||Delta u||^2_Rd</text>
  <text class="mono" x="405" y="516">      + J_human + J_costmap + J_terminal</text>
  <text class="t" x="405" y="550">Adaptive safety:</text>
  <text class="mono" x="405" y="575">phi_h = sigma(z),  d_safe(phi_h) = 0.5 + 0.3 phi_h</text>

  <rect class="math" x="960" y="120" width="360" height="250"/>
  <text class="h" x="985" y="155">Runtime bounds from code</text>
  <text class="mono" x="985" y="190">v_x,max(phi) = 0.45 - 0.37 phi</text>
  <text class="mono" x="985" y="218">v_y,max(phi) = 0.35 - 0.29 phi</text>
  <text class="mono" x="985" y="246">omega_max(phi) = 1.0 - 0.85 phi</text>
  <text class="mono" x="985" y="282">mins: [0.08, 0.06, 0.15]</text>
  <text class="mono" x="985" y="318">goal_tol_xy = 0.25 m</text>
  <text class="mono" x="985" y="346">goal_tol_yaw = 0.35 rad</text>

  <rect class="sensor" x="960" y="400" width="360" height="200"/>
  <text class="h" x="985" y="435">Human-context model</text>
  <text class="mono" x="985" y="470">p_hat_h(k+i|k) = p_h(k) + i T_s v_h(k)</text>
  <text class="mono" x="985" y="500">d_h = min_j ||p_r - p_hat_h,j||_2</text>
  <text class="mono" x="985" y="530">phi_h = max_j phi_h,j</text>
  <text class="mono" x="985" y="560">c_h = c_detector * exp(-trace(P))</text>

  <rect class="plant" x="1380" y="170" width="320" height="170"/>
  <text class="h" x="1405" y="205">Robot body / plant</text>
  <text class="t" x="1405" y="238">Mecanum mobile base</text>
  <text class="t" x="1405" y="266">Pose, wheel motion, interaction</text>
  <text class="t" x="1405" y="294">with map, obstacle, human field</text>

  <rect class="controller" x="380" y="700" width="540" height="320"/>
  <text class="h" x="405" y="735">Low-level closed loop: STM32 wheel PI</text>
  <text class="t" x="405" y="770">Setpoint generation from command / joystick / USART / CAN:</text>
  <text class="mono" x="405" y="795">Move_Y, Angle -&gt; Kinematic_Analysis(Vy, angle)</text>
  <text class="mono" x="405" y="822">Target_A = Vy (1 + T tan(angle) / (2L))</text>
  <text class="mono" x="405" y="849">Target_B = Vy (1 - T tan(angle) / (2L))</text>
  <text class="mono" x="405" y="876">Servo = SERVO_INIT - angle * K</text>
  <text class="t" x="405" y="910">Incremental PI in interrupt loop:</text>
  <text class="mono" x="405" y="935">Bias = Encoder - Target</text>
  <text class="mono" x="405" y="962">Pwm = Pwm + Kp (Bias - Last_bias) + Ki Bias</text>
  <text class="mono" x="405" y="989">PWM saturated to +/-7200, output limited near +/-6900</text>

  <rect class="math" x="960" y="700" width="360" height="320"/>
  <text class="h" x="985" y="735">Low-level set values</text>
  <text class="mono" x="985" y="770">Flash defaults if empty:</text>
  <text class="mono" x="985" y="797">RC_Velocity = 30</text>
  <text class="mono" x="985" y="824">Velocity_KP = 12</text>
  <text class="mono" x="985" y="851">Velocity_KI = 12</text>
  <text class="mono" x="985" y="888">Current globals in system.c:</text>
  <text class="mono" x="985" y="915">RC_Velocity = 500</text>
  <text class="mono" x="985" y="942">Velocity_KP = 300</text>
  <text class="mono" x="985" y="969">Velocity_KI = 300</text>
  <text class="tiny" x="985" y="1000">Note: Flash_Read() overrides these when valid flash data exists.</text>

  <rect class="plant" x="1380" y="700" width="320" height="170"/>
  <text class="h" x="1405" y="735">Motor + wheel subsystem</text>
  <text class="t" x="1405" y="770">PWM, H-bridge direction, servo PWM</text>
  <text class="t" x="1405" y="798">Actuated channels seen in code:</text>
  <text class="mono" x="1405" y="826">Motor_A, Motor_B, Servo</text>

  <rect class="sensor" x="1380" y="920" width="320" height="100"/>
  <text class="h" x="1405" y="955">Low-level feedback</text>
  <text class="mono" x="1405" y="985">Encoder_A = Read_Encoder(2) / 25</text>
  <text class="mono" x="1405" y="1012">Encoder_B = -Read_Encoder(3) / 25</text>

  <path class="arrow" d="M320 195 L380 195"/>
  <text class="tiny" x="332" y="184">goal / reference</text>

  <path class="arrow" d="M320 470 L380 470"/>
  <text class="tiny" x="328" y="458">state feedback</text>

  <path class="arrow" d="M920 260 L1380 260"/>
  <text class="tiny" x="1110" y="248">cmd_vel / planned motion</text>

  <path class="arrow" d="M1540 340 L1540 610 L650 610 L650 600"/>
  <text class="tiny" x="1450" y="600">odom, imu, scan, human context feedback</text>

  <path class="arrow" d="M650 600 L650 700"/>
  <text class="tiny" x="670" y="658">high-level command mapped to wheel targets</text>

  <path class="arrow" d="M920 860 L1380 860"/>
  <text class="tiny" x="1110" y="848">PWM / direction / servo</text>

  <path class="arrow" d="M1540 920 L1540 885"/>
  <path class="arrow" d="M1380 970 L920 970"/>
  <text class="tiny" x="1120" y="958">encoder feedback</text>

  <path class="arrow-soft dashed" d="M1540 1020 L1540 1120 L190 1120 L190 600"/>
  <text class="tiny" x="380" y="1110">robot motion changes future measurements, closing the outer loop</text>

  <rect class="panel-soft" x="60" y="1050" width="1640" height="95"/>
  <text class="h" x="85" y="1084">Interpretation</text>
  <text class="t" x="85" y="1112">Outer loop minimizes pose-tracking and human-aware safety cost in ROS2. Inner loop forces wheel speed to track wheel targets on STM32. The overall system is therefore a hierarchical closed-loop controller.</text>

  <text class="tiny" x="60" y="1185">Sources: stm/BALANCE/control.c, stm/BALANCE/control.h, stm/HARDWARE/encoder.c, stm/HARDWARE/stmflash.c, stm/BALANCE/system.c, docs/1_mo_hinh_toan_ccanmpc.md, rai_ros2/src/rai_navigation/rai_navigation/config/rai_navigation.yaml, rai_ros2/src/rai_human_perception/README.md</text>
</svg>
