rai_controller:
  ros__parameters:
    global_frame: map
    control_frame: odom_combined
    base_frame: base_footprint

    controller_id: CCA_NMPC
    global_planner_algorithm: A_STAR

    odom_topic: /odom_combined
    laser_scan_topic: /scan_filtered
    imu_topic: /imu/data
    map_topic: /map
    costmap_topic: /rai_navigation/local_costmap
    local_grid_topic: /rai_navigation/local_costmap

    goal_topic: /goal_pose
    cancel_topic: /rai_navigation/cancel_topic
    clear_costmap_topic: /rai_navigation/clear_costmap_topic
    replan_topic: /rai_navigation/replan_topic
    status_topic: /rai_navigation/status

    navigate_to_pose_service: /rai_navigation/navigate_to_pose
    cancel_service: /rai_navigation/cancel
    clear_costmap_service: /rai_navigation/clear_costmap
    clear_local_costmap_service: /rai_navigation/clear_local_costmap
    clear_global_costmap_service: /rai_navigation/clear_global_costmap
    replan_service: /rai_navigation/replan
    pause_service: /rai_navigation/pause
    resume_service: /rai_navigation/resume
    get_status_service: /rai_navigation/get_status
    get_path_service: /rai_navigation/get_path
    get_costmap_service: /rai_navigation/get_local_costmap
    list_algorithms_service: /rai_navigation/list_algorithms
    set_controller_service: /rai_navigation/set_controller
    set_planner_service: /rai_navigation/set_planner

    external_path_topic: /rai_navigation/external_path
    global_path_topic: /rai_navigation/global_path
    plan_topic: ""
    cmd_vel_topic: /rai_navigation/cmd_vel

    generated_path_spacing: 0.05
    global_path_smoothing_passes: 1
    global_planner_inflation_radius: 0.28
    local_grid_resolution: 0.05
    local_grid_width_m: 4.0
    local_grid_height_m: 4.0

    robot_radius: 0.18
    obstacle_inflation_radius: 0.25
    obstacle_lethal_radius: 0.18
    slowdown_inflation_radius: 0.55
    slowdown_cost: 35
    inscribed_cost: 85
    map_occupied_threshold: 65
    treat_unknown_as_obstacle: false
    max_laser_age_sec: 0.5
    use_imu_angular_velocity: true
    max_imu_age_sec: 0.5
    control_frequency: 25.0
    max_solver_time_ms: 35.0
    stop_on_stale_odom_sec: 0.5
    stop_on_missing_plan: true
    goal_tolerance_xy: 0.25
    goal_tolerance_yaw: 0.35

    recovery_enabled: true
    recovery_max_attempts: 3
    recovery_backup_speed: 0.08
    recovery_backup_duration_sec: 0.8
    recovery_spin_speed: 0.35
    recovery_spin_duration_sec: 1.2

    horizon_steps: 20
    sample_time: 0.04
    max_reference_length: 3.0
    default_v_ref: 0.35
    vx_samples: 7
    vy_samples: 7
    omega_samples: 9
    adaptive_sampling: true
    refinement_samples: 3
    max_control_samples: 180
    refinement_radius_fraction: 0.35
    timeout_margin_ms: 3.0
    min_speed_xy: 0.03
    acc_lim_x: 0.8
    acc_lim_y: 0.8
    acc_lim_theta: 1.2

    beta: 3.0
    d0: 2.5
    context_distance_weight: 6.0
    context_velocity_weight: 1.0
    context_direction_weight: 1.0
    context_confidence_weight: 0.5
    context_bias: 0.0
    human_velocity_max: 1.5
    d_safe_0: 0.5
    d_safe_max: 0.8
    k_d: 0.3
    vx_max_0: 0.45
    vy_max_0: 0.35
    omega_max_0: 1.0
    vx_max_min: 0.08
    vy_max_min: 0.06
    omega_max_min: 0.15
    k_vx: 0.37
    k_vy: 0.29
    k_omega: 0.85

    q_x: 10.0
    q_y: 10.0
    q_theta: 5.0
    q_human_x: 35.0
    q_human_y: 35.0
    q_human_theta: 10.0
    r_vx: 0.1
    r_vy: 0.1
    r_omega: 0.05
    rd_vx: 1.0
    rd_vy: 1.0
    rd_omega: 0.5
    human_cost_weight: 8.0
    costmap_cost_weight: 0.02
    terminal_cost_weight: 12.0
    w_slack: 100000.0
    max_compute_time_ms: 35.0
    max_human_age_sec: 0.5
    costmap_collision_threshold: 98.0
