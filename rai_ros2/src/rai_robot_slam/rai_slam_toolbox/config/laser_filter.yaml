scan_box_filter_node:
  ros__parameters:
    input_topic: /scan
    output_topic: /scan_filtered
    # Robot axes from mini_mec_robot.urdf:
    # +x = front, -x = rear, +y = left, -y = right.
    box_frame: base_footprint
    min_x: -0.50
    max_x: 0.30
    min_y: -0.35
    max_y: 0.35
    min_z: -0.20
    max_z: 0.35
    invert: false
