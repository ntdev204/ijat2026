rai_ccanmpc_controller:
  ros__parameters:
    global_frame: map
    control_frame: odom_combined
    base_frame: base_footprint
    odom_topic: /odom_combined
    costmap_topic: /local_costmap/costmap
    goal_topic: /goal_pose
    external_path_topic: /canmpc/global_path
    plan_topic: /plan
    planner_action_name: compute_path_to_pose
    planner_id: GridBased
    cmd_vel_topic: /cca_nmpc/cmd_vel
    control_frequency: 20.0
    max_solver_time_ms: 50.0
    stop_on_stale_odom_sec: 0.5
    stop_on_missing_plan: true

    horizon_steps: 20
    sample_time: 0.05
    max_reference_length: 3.0
    default_v_ref: 0.35
    vx_samples: 7
    vy_samples: 7
    omega_samples: 9
    min_speed_xy: 0.03
    acc_lim_x: 0.8
    acc_lim_y: 0.8
    acc_lim_theta: 1.2

    beta: 3.0
    d0: 2.5
    d_safe_0: 0.5
    d_safe_max: 0.8
    vx_max_0: 0.45
    vy_max_0: 0.35
    omega_max_0: 1.0
    vx_max_min: 0.08
    vy_max_min: 0.06
    omega_max_min: 0.15

    q_x: 10.0
    q_y: 10.0
    q_theta: 5.0
    q_human_x: 35.0
    q_human_y: 35.0
    q_human_theta: 10.0
    r_vx: 0.1
    r_vy: 0.1
    r_omega: 0.05
    rd_vx: 1.0
    rd_vy: 1.0
    rd_omega: 0.5
    human_cost_weight: 8.0
    costmap_cost_weight: 0.02
    terminal_cost_weight: 12.0
    w_slack: 100000.0
    max_compute_time_ms: 50.0
    max_human_age_sec: 0.5
